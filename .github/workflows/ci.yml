# --------------------------------------------
# 🚀 Continuous Integration (Next.js Project)
# Runs on every push to feature branches
# Checks:
# - TypeScript errors
# - ESLint issues
# - Prettier formatting
# - Production build
# --------------------------------------------

name: CI

# Run on push to any branch except main
on:
  push:
    branches-ignore:
      - main

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest

    # If your Next.js app is inside /voxlibris
    defaults:
      run:
        working-directory: voxlibris

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js (LTS version recommended)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: voxlibris/package-lock.json

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ TypeScript type checking
      - name: Type check
        run: npx tsc --noEmit

      # 5️⃣ ESLint check
      - name: Lint
        run: npm run lint

      # 6️⃣ Prettier format check
      - name: Prettier Check
        run: npm run format:check

      # 7️⃣ Ensure production build works
      - name: Build project
        run: npm run build
